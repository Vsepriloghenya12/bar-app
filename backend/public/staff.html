<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Заявка</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="staff-theme anime-ui">
  <div class="anime-wall staff-wall" aria-hidden="true">
    <span class="anime-sticker naruto">🍥 Naruto</span>
    <span class="anime-sticker bleach">⚔️ Bleach</span>
    <span class="anime-sticker onepiece">☠️ One Piece</span>
    <span class="anime-sticker haikyuu">🏐 Haikyuu!!</span>
    <span class="anime-sticker chainsaw">🪚 Chainsaw Man</span>
    <span class="anime-sticker jjk">🟣 Jujutsu Kaisen</span>
    <span class="anime-sticker tokyoghoul">🕸️ Tokyo Ghoul</span>
    <span class="anime-sticker sailor">🌙 Sailor Moon</span>
  </div>

  <div class="container app-shell">
    <header class="hero-panel hero-staff">
      <div class="hero-copy">
        <div class="eyebrow">staff mode</div>
        <h1>Создать заявку</h1>
        <p class="hero-subtitle">Быстрый заказ товаров и контроль статусов в новом стиле с аниме-стикерами.</p>
      </div>
      <div class="hero-chip-row">
        <span class="hero-chip">JJK</span>
        <span class="hero-chip">Naruto</span>
        <span class="hero-chip">One Piece</span>
      </div>
    </header>

    <section class="section-panel">
      <div class="section-head">
        <div>
          <div class="section-caption">new order</div>
          <h2>Товары по категориям</h2>
        </div>
      </div>
      <div id="category-list"></div>
      <button id="send-btn" class="primary-btn">Отправить заявку</button>
    </section>

    <hr>

    <section class="section-panel">
      <div class="section-head">
        <div>
          <div class="section-caption">tracking</div>
          <h2>Активные заявки</h2>
        </div>
      </div>
      <div id="active-orders"></div>
    </section>
  </div>

  <script src="staff.js"></script>
</body>
</html>
