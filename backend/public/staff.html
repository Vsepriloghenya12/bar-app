<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Заявка</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="staff-theme page-staff">
  <div class="anime-bg" aria-hidden="true">
    <img src="./anime/gojo.png" class="anime-figure staff-gojo" alt="">
    <img src="./anime/tanjiro.png" class="anime-figure staff-tanjiro" alt="">
    <img src="./anime/luffy.png" class="anime-figure staff-luffy" alt="">
  </div>

  <div class="container app-shell">
    <header class="topbar">
      <div>
        <div class="role-pill">staff</div>
        <h1>Заявка</h1>
      </div>
    </header>

    <section class="section-shell">
      <div class="section-head">

      </div>
      <div id="category-list" class="list-sheet"></div>
      <button id="send-btn" class="primary-btn">Отправить заявку</button>

    <section class="section-shell section-gap-large">
      <div class="section-head">
        <h2>Активные заявки</h2>
      </div>
      <div id="active-orders" class="list-sheet"></div>

  <script src="staff.js"></script>
