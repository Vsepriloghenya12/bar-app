<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Заявка</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="staff-theme anime-ui">
  <div class="anime-wall staff-wall" aria-hidden="true">
    <span class="anime-logo naruto"></span>
    <span class="anime-logo bleach"></span>
    <span class="anime-logo onepiece"></span>
    <span class="anime-logo haikyuu"></span>
    <span class="anime-logo chainsaw"></span>
    <span class="anime-logo jjk"></span>
    <span class="anime-logo tokyoghoul"></span>
    <span class="anime-logo sailormoon"></span>
  </div>

  <div class="container app-shell">
    <header class="topbar">
      <div>
        <div class="role-pill">staff</div>
        <h1>Заявка</h1>
      </div>
    </header>

    <section class="section-shell">
      <div class="section-head">
        <h2>Товары</h2>
      </div>
      <div id="category-list" class="list-sheet"></div>
      <button id="send-btn" class="primary-btn">Отправить заявку</button>
    </section>

    <section class="section-shell section-gap-large">
      <div class="section-head">
        <h2>Активные заявки</h2>
      </div>
      <div id="active-orders" class="list-sheet"></div>
    </section>
  </div>

  <script src="staff.js"></script>
</body>
</html>
