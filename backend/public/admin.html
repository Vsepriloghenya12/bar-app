<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Владелец — Заявки</title>
  <link rel="stylesheet" href="./styles.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body class="owner-theme">
<div class="anime-stickers" aria-hidden="true">
  <span class="sticker st-1">にゃ</span>
  <span class="sticker st-2">★</span>
  <span class="sticker st-3">ramen</span>
  <span class="sticker st-4">♡</span>
  <span class="sticker st-5">senpai</span>
  <span class="sticker st-6">✦</span>
  <span class="sticker st-7">kawaii</span>
  <span class="sticker st-8">ネコ</span>
</div>
<div class="container">
  <h1>Панель владельца</h1>

  <div class="tabs-row">
    <button id="tab-catalog" class="tab-btn active" onclick="switchAdminTab('catalog')">Товары и поставщики</button>
    <button id="tab-requisitions" class="tab-btn" onclick="switchAdminTab('requisitions')">Заявки сотрудников</button>
  </div>

  <section id="page-catalog" class="section-panel">
    <h2>Поставщики</h2>

    <div class="card">
      <h3>Добавить поставщика</h3>
      <input id="sup-name" placeholder="Название">
      <input id="sup-note" placeholder="Контакты / заметка">
      <button onclick="addSupplier()">Добавить</button>
    </div>

    <div id="suppliers"></div>

    <hr style="opacity:0.2;margin:12px 0;">

    <h2>Товары</h2>

    <div class="card">
      <h3>Добавить товар</h3>

      <input id="prod-name" placeholder="Название товара">
      <input id="prod-unit" placeholder="Ед. изм. (л, кг, шт)">

      <label>Категория:</label>
      <select id="prod-category"></select>
      <input id="prod-category-new" placeholder="Новая категория (если нет в списке)">

      <label>Основной поставщик:</label>
      <select id="prod-supplier"></select>

      <button onclick="addProduct()">Добавить товар</button>
    </div>

    <div id="products"></div>
  </section>

  <section id="page-requisitions" class="section-panel hidden">
    <div class="section-head">
      <h2>Заявки сотрудников</h2>
      <button class="ghost-btn" onclick="loadOwnerRequisitions()">Обновить</button>
    </div>

    <div id="requisitions"></div>
  </section>
</div>

<script src="./admin.js"></script>
</body>
</html>
