<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Владелец — Заявки</title>
  <link rel="stylesheet" href="./styles.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="owner-theme page-owner">
  <div class="anime-bg" aria-hidden="true">
    <img src="./anime/naruto.png" class="anime-figure owner-naruto" alt="">
    <img src="./anime/ichigo.png" class="anime-figure owner-ichigo" alt="">
    <img src="./anime/luffy.png" class="anime-figure owner-luffy" alt="">
  </div>

  <div class="container app-shell">
    <header class="topbar">
      <div>
        <div class="role-pill">owner</div>
        <h1>Панель владельца</h1>
      </div>
    </header>

    <div class="tabs-row">
      <button id="tab-catalog" class="tab-btn active" onclick="switchAdminTab('catalog')">Товары и поставщики</button>
      <button id="tab-requisitions" class="tab-btn" onclick="switchAdminTab('requisitions')">Заявки сотрудников</button>
    </div>

    <section id="page-catalog" class="section-shell">
      <div class="section-head">
        <h2>Поставщики</h2>
      </div>

      <div class="form-card form-stack">
        <div class="field-grid">
          <input id="sup-name" placeholder="Название поставщика">
          <input id="sup-note" placeholder="Контакты / заметка">
        </div>
        <button onclick="addSupplier()">Добавить поставщика</button>
      </div>

      <div id="suppliers" class="list-sheet"></div>

      <div class="section-head section-gap">
        <h2>Товары</h2>
      </div>

      <div class="form-card form-stack">
        <div class="field-grid">
          <input id="prod-name" placeholder="Название товара">
          <input id="prod-unit" placeholder="Ед. изм. (л, кг, шт)">
        </div>

        <div class="field-grid stacked-mobile">
          <div>
            <label>Категория</label>
            <select id="prod-category"></select>
          </div>
          <div>
            <label>Новая категория</label>
            <input id="prod-category-new" placeholder="Если категории нет в списке">
          </div>
        </div>

        <div>
          <label>Основной поставщик</label>
          <select id="prod-supplier"></select>
        </div>

        <button onclick="addProduct()">Добавить товар</button>
      </div>

      <div id="products" class="list-sheet"></div>
    </section>

    <section id="page-requisitions" class="section-shell hidden">
      <div class="section-head">
        <h2>Заявки сотрудников</h2>
        <button class="ghost-btn" onclick="loadOwnerRequisitions()">Обновить</button>
      </div>

      <div id="requisitions" class="list-sheet"></div>
    </section>
  </div>

  <script src="./admin.js"></script>
</body>
</html>
